name: Deploy Samhara to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            yarn install
          fi

      - name: Build Next.js
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
        run: |
          echo "$APP_ENV" | base64 -d > .env.tmp
          set -a
          source .env.tmp
          set +a
          rm .env.tmp
          export NODE_ENV=production
          yarn build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Write .env file
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
        run: |
          echo "$APP_ENV" | base64 -d > .env
          echo "PORT=3002" >> .env

      - name: Create deploy directory on EC2
        run: |
          ssh -T -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo mkdir -p /var/www/nextjs-app-3 && sudo chown ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /var/www/nextjs-app-3"

      - name: Deploy to EC2
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            -e "ssh -i ~/.ssh/ec2.pem" \
            ./ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/nextjs-app-3

      - name: Install deps & Restart App
        run: |
          ssh -T -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /var/www/nextjs-app-3
            if ! command -v yarn &> /dev/null; then
              npm install -g yarn
            fi
            if [ -f yarn.lock ]; then
              yarn install --frozen-lockfile --production
            else
              yarn install --production
            fi
            if pm2 describe samhara > /dev/null 2>&1; then
              pm2 restart samhara --update-env
            else
              pm2 start sh --name "samhara" -- -c "cd /var/www/nextjs-app-3 && PORT=3002 yarn start"
            fi
            pm2 save
          EOF
